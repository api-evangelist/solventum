aid: solventum
name: Solventum
description: >-
  Solventum is a Fortune 500 healthcare company spun off from 3M in 2024,
  focused on healthcare technology including medical-surgical solutions,
  dental and orthodontic products, health information systems, and purification
  and filtration technologies. Solventum serves hospitals, clinics, dental
  practices, and healthcare IT organizations worldwide.
