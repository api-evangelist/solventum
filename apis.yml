apis:
  - aid: solventum:health-information-systems
    name: Solventum Health Information Systems API
    description: >-
      Solventum's Health Information Systems (formerly 3M HIS) provides APIs
      for clinical documentation, coding and grouping, computer-assisted coding
      (CAC), revenue cycle management, and healthcare analytics. These APIs
      integrate with EHR systems such as Epic, Cerner, and Oracle Health to
      support clinical coding, DRG grouping, and quality reporting.
    humanURL: https://www.solventum.com/en-us/home/health-information-systems/
    tags:
      - CAC
      - Clinical Coding
      - DRG Grouping
      - EHR Integration
      - Health Information Systems
      - Healthcare Analytics
      - ICD-10
      - Revenue Cycle
    properties:
      - type: Documentation
        url: https://www.solventum.com/en-us/home/health-information-systems/
      - type: APIReference
        url: https://developer.solventum.com/

  - aid: solventum:clinical-documentation-improvement
    name: Solventum Clinical Documentation Improvement API
    description: >-
      APIs supporting computer-assisted clinical documentation improvement
      (CDI) workflows, providing real-time query generation, physician
      query management, and documentation quality analysis to improve
      specificity, accuracy, and completeness of clinical documentation.
    humanURL: https://www.solventum.com/en-us/home/health-information-systems/clinical-documentation-integrity/
    tags:
      - CDI
      - Clinical Documentation
      - Clinical Documentation Improvement
      - Healthcare IT
      - Physician Query
    properties:
      - type: Documentation
        url: https://www.solventum.com/en-us/home/health-information-systems/clinical-documentation-integrity/

